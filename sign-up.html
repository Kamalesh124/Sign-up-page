<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background-color: rgb(131, 228, 228);
      border-radius: 5px;
      box-shadow: 0 2px 5px greenyellow;
    }

    h2 {
      text-align: center;
      color: #005792;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border-radius: 3px;
      border: 1px solid #cccccc;
    }

    .form-group button {
      width: 100%;
      padding: 10px;
      background-color: #005792;
      border: none;
      color: #ffffff;
      cursor: pointer;
      border-radius: 3px;
    }

    .form-group button:hover {
      background-color: #003655;
    }

    .form-group .text-center {
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 style="color: #005792;">IoT Club</h2>
    <form>
      <div class="form-group">
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="firstname" placeholder="Enter your first name" required>
      </div>
      <div class="form-group">
        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="lastname" placeholder="Enter your last name" required>
      </div>
      <div class="form-group">
        <label for="university">University:</label>
        <input type="text" id="university" name="university" placeholder="Enter your university name" required>
      </div>
      <div class="form-group">
        <label for="mobile">Mobile Number:</label>
        <input type="text" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
      </div>
      <div class="form-group">
        <label for="registration">Registration Number:</label>
        <input type="text" id="registration" name="registration" placeholder="Enter your registration number" required>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
      </div>
      <div class="form-group">
        <label for="year">Year:</label>
        <input type="text" id="year" name="year" placeholder="Enter your year of study" required>
      </div>
      <div class="form-group">
        <label for="subdomain">Sub-domain:</label>
        <input type="text" id="sub
        domain" name="subdomain" placeholder="Enter your sub-domain" required>
    </div>
    <div class="form-group">
    <button type="submit">Sign Up</button>
    </div>
    <div class="form-group text-center">
    <p>Already have an account? <a href="#">Log in</a></p>
    </div>
    </form>
    
      </div>
    </body>
    </html>
